name: Report a Problem
description: Report a broken link, hype language, outdated content, or quality issue
title: "[PROBLEM] "
labels: ["needs-review"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Problem type
      options:
        - broken-link
        - hype-language
        - outdated-content
        - inaccurate-information
        - ethical-concern
        - other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Where is the problem?
      description: File path or URL
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the problem and why should it be fixed?
    validations:
      required: true
