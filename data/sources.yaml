# Sources used for automated idea discovery
# Fields:
#   type: github | hn | reddit | producthunt | web | arxiv | newsletter
#   status: active | candidate | paused
#   search_query: used directly in GitHub/HN API calls
#   url: for web/scrape type sources
#   frequency: daily | weekly
#   added_at: ISO date
sources:
  github_llm_tools:
    type: github
    description: GitHub repos — LLM tools, agents, and AI apps
    search_query: "llm OR rag OR 'ai agent' OR 'ai automation' language:python"
    frequency: daily
    status: active
    added_at: "2026-05-01"

  github_ai_saas:
    type: github
    description: GitHub repos — AI SaaS starters and boilerplates
    search_query: "ai saas starter OR ai boilerplate OR llm app template"
    frequency: daily
    status: active
    added_at: "2026-05-01"

  github_awesome_ai:
    type: github
    description: Awesome AI curated lists
    search_query: "awesome llm OR awesome ai agents OR awesome ai apps"
    frequency: weekly
    status: active
    added_at: "2026-05-01"

  github_openai_tools:
    type: github
    description: OpenAI / Anthropic ecosystem tools
    search_query: "openai assistant OR anthropic claude tool OR gemini agent"
    frequency: daily
    status: active
    added_at: "2026-05-01"

  github_ai_startups:
