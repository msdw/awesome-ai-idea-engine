# Sources for automated AI idea discovery
# Maintain this file: set status: active to use a source in daily/weekly discovery.
# The discover_new_ideas.py script reads github/hn type sources with search_query.
# Web/reddit/producthunt sources are logged for manual review.
#
# Status values: active | paused | candidate
# Frequencies:   daily  | weekly

sources:

  # ── GitHub API searches (authenticated, 5000 req/h) ──────────────────────────

  github_llm_apps:
    type: github
    description: LLM-powered apps — agents, assistants, automation tools
    search_query: "llm app OR ai agent OR rag pipeline language:python stars:>50"
    frequency: daily
    status: active
    added_at: "2026-05-01"
    notes: High signal — actively built Python repos with traction

  github_ai_tools_shipped:
    type: github
    description: Shipped AI SaaS tools and micro-products
    search_query: "ai tool OR ai saas OR ai automation language:typescript stars:>30"
    frequency: daily
    status: active
    added_at: "2026-05-26"
    notes: TypeScript covers Next.js / Vercel indie SaaS tier

  github_openai_anthropic_apps:
    type: github
    description: Apps built on OpenAI / Anthropic / Gemini APIs
    search_query: "openai OR anthropic OR gemini API app product language:python stars:>40"
    frequency: daily
    status: active
    added_at: "2026-05-26"
    notes: API ecosystem is the fastest-moving layer for AI ideas

  github_awesome_ai_lists:
    type: github
    description: Curated awesome-AI lists — mine for idea patterns
    search_query: "awesome llm OR awesome ai agents OR awesome ai tools"
    frequency: weekly
    status: active
    added_at: "2026-05-01"
    notes: Awesome lists are lagging indicators but great for pattern mining

  github_ai_startups_oss:
    type: github
    description: Open-source AI startup projects
    search_query: "ai startup open source OR llm startup boilerplate stars:>100"
    frequency: weekly
    status: active
    added_at: "2026-06-01"

  # ── Hacker News (Algolia API, no auth required) ──────────────────────────────

  hn_show_ai_tool:
    type: hn
    description: Show HN — launched AI tools and demos
    search_query: "Show HN AI tool"
    frequency: daily
    status: active
    added_at: "2026-05-01"
    notes: Best signal for freshly shipped products with community validation

  hn_show_llm_app:
    type: hn
    description: Show HN — LLM-powered applications
    search_query: "Show HN LLM"
    frequency: daily
    status: active
    added_at: "2026-05-01"

  hn_show_saas_ai:
    type: hn
    description: Show HN — AI SaaS launches
    search_query: "Show HN SaaS AI"
    frequency: daily
    status: active
    added_at: "2026-06-01"

  hn_ask_startup_ideas:
    type: hn
    description: Ask HN — startup ideas and validation threads
    search_query: "Ask HN what are you building AI"
    frequency: weekly
    status: active
    added_at: "2026-05-26"
    notes: '"What are you building" threads surface early-stage unmet needs'

  # ── Web sources (manual review — not consumed by scripts automatically) ────────

  producthunt_ai_daily:
    type: producthunt
    description: Product Hunt AI category — daily new launches
    url: "https://www.producthunt.com/topics/artificial-intelligence?order=newest"
    frequency: daily
    status: active
    added_at: "2026-05-01"
    notes: Best for spotting new AI products 24h after launch

  theresanaiforthat:
    type: web
    description: There's An AI For That — most saved tools, gaps = opportunity
    url: "https://theresanaiforthat.com/most-saved/"
    frequency: weekly
    status: active
    added_at: "2026-05-26"

  futurepedia_new:
    type: web
    description: Futurepedia — newest AI tools submitted
    url: "https://www.futurepedia.io/ai-tools?sort=new"
    frequency: weekly
    status: active
    added_at: "2026-05-26"

  reddit_saas_launches:
    type: reddit
    description: r/SaaS — new AI product launches and feedback
    subreddit: SaaS
    url: "https://www.reddit.com/r/SaaS/search/?q=AI&sort=new&t=week"
    frequency: weekly
    status: active
    added_at: "2026-05-01"

  reddit_sideproject_ai:
    type: reddit
    description: r/SideProject — AI side projects looking for early users
    subreddit: SideProject
    url: "https://www.reddit.com/r/SideProject/search/?q=AI&sort=new&t=week"
    frequency: weekly
    status: active
    added_at: "2026-05-26"
    notes: Side projects = unvalidated ideas — high volume but noisy

  arxiv_cs_ai_recent:
    type: arxiv
    description: arXiv CS.AI — practical AI papers that spawn products
    url: "https://arxiv.org/list/cs.AI/recent"
    frequency: weekly
    status: paused
    added_at: "2026-05-01"
    notes: Paused — academic signal too slow; re-enable for quarterly trend analysis
